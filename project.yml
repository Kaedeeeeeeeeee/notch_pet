name: NotchPet
options:
  bundleIdPrefix: com.notchpet
  deploymentTarget:
    macOS: "15.0"
  createIntermediateGroups: true
  generateEmptyDirectories: true
settings:
  base:
    SWIFT_VERSION: "5.10"
    MACOSX_DEPLOYMENT_TARGET: "15.0"
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
    ENABLE_HARDENED_RUNTIME: YES
    DEAD_CODE_STRIPPING: YES
targets:
  NotchPet:
    type: application
    platform: macOS
    deploymentTarget: "15.0"
    sources:
      - path: NotchPet
        excludes:
          - "Assets/Sprites/**"
          - "Assets/Audio/**"
      - path: NotchPet/Assets/Sprites
        type: folder
        buildPhase: resources
      - path: NotchPet/Assets/Audio
        type: folder
        buildPhase: resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.notchpet.NotchPet
        INFOPLIST_FILE: NotchPet/Resources/Info.plist
        CODE_SIGN_ENTITLEMENTS: NotchPet/Resources/NotchPet.entitlements
        CODE_SIGN_STYLE: Automatic
        CODE_SIGN_IDENTITY: "-"
        ENABLE_APP_SANDBOX: NO
        LSUIElement: YES
        COMBINE_HIDPI_IMAGES: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
